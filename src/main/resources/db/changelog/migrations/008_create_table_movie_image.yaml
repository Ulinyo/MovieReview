databaseChangeLog:
  - changeSet:
      id: 008
      author: Anarbekov Ulukman
      changes:
        - createTable:
            tableName: movie_images
            columns:
              - column:
                  name: id
                  type: long
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
                    unique: true
              - column:
                  name: movie_id
                  type: long
                  constraints:
                    nullable: false
                    foreignKeyName: fk_movie_images
                    references: movie(id)
              - column:
                  name: filename
                  type: varchar(255)
                  constraints:
                    nullable: false